<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン — UPJ Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #0a0a0f;
      --s1:      #111118;
      --s2:      #18181f;
      --border:  #2a2a35;
      --accent:  #6366f1;
      --accent2: #818cf8;
      --text:    #e2e8f0;
      --muted:   #64748b;
      --radius:  12px;
      --danger:  #f87171;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-image:
        radial-gradient(ellipse 60% 40% at 50% 0%, rgba(99,102,241,.15) 0%, transparent 60%),
        radial-gradient(ellipse 40% 30% at 80% 80%, rgba(129,140,248,.08) 0%, transparent 50%);
    }
    .card {
      background: var(--s1);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 24px 80px rgba(0,0,0,.5);
    }
    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin: 0 auto 16px;
      box-shadow: 0 8px 24px rgba(99,102,241,.4);
    }
    .logo h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }
    .logo p {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 8px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    input[type="password"] {
      width: 100%;
      padding: 12px 16px;
      background: var(--s2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: inherit;
      font-size: 15px;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      margin-bottom: 20px;
    }
    input[type="password"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(99,102,241,.2);
    }
    button[type="submit"] {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 10px;
      color: #fff;
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
      letter-spacing: 0.2px;
    }
    button[type="submit"]:hover { opacity:.9; transform:translateY(-1px); }
    button[type="submit"]:active { transform:translateY(0); }
    .error {
      background: rgba(248,113,113,.1);
      border: 1px solid rgba(248,113,113,.3);
      color: var(--danger);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
      text-align: center;
    }
    .footer {
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      margin-top: 24px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon"><span style="display:inline-flex;align-items:center;"><i data-lucide="building"></i></span></div>
      <h1>UPJ Dashboard</h1>
      <p>管理者パスワードを入力してください</p>
    </div>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">
      <label for="password">パスワード</label>
      <input type="password" id="password" name="password"
             placeholder="••••••••" autofocus autocomplete="current-password">
      <button type="submit">ログイン</button>
    </form>

    <div class="footer">UPJ Automation System</div>
  </div>

  <script>
    // Enterキーでsubmit
    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') e.target.form.submit();
    });
  </script>
</body>
</html>
