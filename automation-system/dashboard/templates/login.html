<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン — UPJ Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@1.14.0/dist/umd/lucide.min.js"></script>
  <style>
    :root {
      --bg:      #050505;
      --s1:      #090909;
      --s2:      #101010;
      --border:  rgba(139,92,246,.11);
      --border2: rgba(139,92,246,.26);
      --accent:  #8B5CF6;
      --accent2: #A78BFA;
      --text:    #f0e8d8;
      --muted:   #564e3c;
      --muted2:  #9a8660;
      --radius:  12px;
      --danger:  #ef4444;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, 'Hiragino Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-image:
        radial-gradient(ellipse 60% 40% at 50% 0%, rgba(139,92,246,.10) 0%, transparent 60%),
        radial-gradient(ellipse 40% 30% at 80% 80%, rgba(139,92,246,.05) 0%, transparent 50%);
    }
    .card {
      background: var(--s1);
      border: 1px solid var(--border2);
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 24px 80px rgba(0,0,0,.7), 0 0 0 1px rgba(139,92,246,.06);
    }
    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #8B5CF6, #A78BFA);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin: 0 auto 16px;
      box-shadow: 0 8px 24px rgba(139,92,246,.35);
      color: #000;
    }
    .logo h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--text);
    }
    .logo p {
      font-size: 13px;
      color: var(--muted2);
      margin-top: 4px;
    }
    label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted2);
      margin-bottom: 8px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }
    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 12px 16px;
      background: var(--s2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: inherit;
      font-size: 15px;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      margin-bottom: 20px;
    }
    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(139,92,246,.15);
    }
    input::placeholder { color: var(--muted); }
    button[type="submit"] {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #8B5CF6, #A78BFA);
      border: none;
      border-radius: 10px;
      color: #000;
      font-family: inherit;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
      letter-spacing: 0.2px;
    }
    button[type="submit"]:hover { opacity:.9; transform:translateY(-1px); }
    button[type="submit"]:active { transform:translateY(0); }
    .error {
      background: rgba(239,68,68,.1);
      border: 1px solid rgba(239,68,68,.3);
      color: var(--danger);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
      text-align: center;
    }
    .footer {
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      margin-top: 24px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon"><span style="display:inline-flex;align-items:center;"><i data-lucide="building"></i></span></div>
      <h1>UPJ Dashboard</h1>
      <p>管理者アカウントでログインしてください</p>
    </div>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">
      <label for="username">ユーザー名</label>
      <input type="text" id="username" name="username"
             placeholder="admin" autofocus autocomplete="username">
      <label for="password">パスワード</label>
      <input type="password" id="password" name="password"
             placeholder="••••••••" autocomplete="current-password">
      <button type="submit">ログイン</button>
    </form>

    <div class="footer">UPJ Automation System</div>
  </div>

  <script>
    lucide.createIcons();
    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') e.target.form.submit();
    });
  </script>
</body>
</html>
