theme: 資金繰り表の読み方の基本
content: |
  資金繰り表は「お金の出入りを時系列で見る表」。

  確認すべき3点：
  ① 月末残高がマイナスになる月はないか
  ② 支払いが集中する時期はどこか
  ③ 売掛金回収と支払いのズレはどこか

  PL（損益）が黒字でも倒産するのは、このズレが原因です。まず表を作るところから始めましょう。

  資金繰り表のテンプレートが必要な方、DMで送ります。
