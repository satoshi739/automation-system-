content: '「ファクタリング＝借金」ではありません。


  ファクタリングは売掛金（将来受け取るお金）を今売る仕組みです。


  ・負債にならない（借入と違いBSに載らない）

  ・返済義務がない

  ・審査の軸は"取引先の信用力"


  銀行融資とは別の選択肢として知っておくと、資金繰りの幅が広がります。


  資金繰りの相談はDMで受け付けています。

