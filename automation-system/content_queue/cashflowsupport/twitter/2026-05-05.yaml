theme: ファクタリング会社を選ぶ時の3つの注意点
content: |
  ファクタリング会社を選ぶ際の注意点3つ：

  ① 手数料は書面で確認
  　→ 口頭の数字だけで判断しない

  ② 「買い戻し特約」に注意
  　→ あると実質貸付とみなされるケースも

  ③ 法令遵守を確認
  　→ 給与ファクタリングは貸金業法の対象

  焦っているときほど、冷静に比較することが大切です。

  ファクタリング会社の比較相談、DMで受付中です。
