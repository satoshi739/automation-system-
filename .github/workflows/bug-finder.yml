name: Bug Finding Agent

on:
  pull_request:
    branches: [main]
    paths:
      - 'automation-system/**'
      - 'finance-system/**'
      - 'customer-success-system/**'
      - 'project-system/**'
      - 'marketing-system/**'
      - 'sales-system/**'
      - '.github/workflows/bug-finder.yml'

jobs:
  bug-finder:
    name: 🐛 Analyze PR for bugs
    # PR タイトルに [skip-bugcheck] があればスキップ
    if: "!contains(github.event.pull_request.title, '[skip-bugcheck]')"
    runs-on: ubuntu-latest
    permissions:
      contents: write       # fix ブランチの push に必要
      pull-requests: write  # Draft PR 作成に必要

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0                                      # origin/main との累積 diff に必要
          ref: ${{ github.event.pull_request.head.sha }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install anthropic requests

      - name: Configure git for auto-fix commits
        run: |
          git config user.email "bug-finder-bot@github-actions"
          git config user.name "Bug Finding Agent"

      - name: Run Bug Finding Agent
        env:
          ANTHROPIC_API_KEY:               ${{ secrets.ANTHROPIC_API_KEY }}
          ALERT_LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.ALERT_LINE_CHANNEL_ACCESS_TOKEN }}
          OWNER_LINE_USER_ID:              ${{ secrets.OWNER_LINE_USER_ID }}
          GITHUB_TOKEN:                    ${{ secrets.GITHUB_TOKEN }}
          COMMIT_SHA:                      ${{ github.event.pull_request.head.sha }}
          COMMIT_MESSAGE:                  ${{ github.event.pull_request.title }}
          REPO:                            ${{ github.repository }}
          BRANCH:                          ${{ github.base_ref }}
          BASE_SHA:                        ${{ github.event.pull_request.base.sha }}
          HEAD_SHA:                        ${{ github.event.pull_request.head.sha }}
          PR_NUMBER:                       ${{ github.event.pull_request.number }}
        run: python automation-system/agents/bug_finder_agent.py
